name: Update BKFC Calendar

on:
  schedule:
    # Runs every Monday at 6:00 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual runs from the GitHub UI

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BKFC_Events.ics
          git diff --cached --quiet || git commit -m "chore: update BKFC calendar [$(date -u '+%Y-%m-%d')]"
          git push
