name: Update BKFC Calendar

on:
  schedule:
    # Runs every Monday at 6:00 AM UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual runs from the GitHub UI

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py 2>&1 | tee scraper.log; exit ${PIPESTATUS[0]}

      - name: Verify output file exists
        run: |
          if [ ! -f BKFC_Events.ics ]; then
            echo "❌ BKFC_Events.ics was not generated — scraper may have failed."
            exit 1
          fi
          echo "✅ BKFC_Events.ics generated successfully."
          wc -l BKFC_Events.ics

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BKFC_Events.ics
          if git diff --cached --quiet; then
            echo "✅ No changes to calendar — already up to date."
          else
            git commit -m "chore: update BKFC calendar [$(date -u '+%Y-%m-%d')]"
            git push
          fi
